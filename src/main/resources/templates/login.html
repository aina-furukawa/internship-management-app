<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <header class="page-header page-header--form">
            <span class="header-badge">就活・インターン管理</span>
            <h1>ログイン</h1>
            <p>登録したメールアドレスとパスワードでログインしてください</p>
        </header>

        <div class="card auth-card">
            <p class="alert alert-success" th:if="${param.registered}">アカウント登録が完了しました。ログインしてください。</p>
            <p class="alert alert-info" th:if="${param.logout}">ログアウトしました。</p>
            <p class="alert alert-error" th:if="${param.error}">メールアドレスまたはパスワードが正しくありません。</p>

            <form th:action="@{/login}" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="username">メールアドレス</label>
                        <input type="email" id="username" name="username" placeholder="例: you@example.com" required autofocus>
                    </div>

                    <div class="form-group">
                        <label for="password">パスワード</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">ログイン</button>
                    <a href="/signup" class="btn btn-secondary">新規登録</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
